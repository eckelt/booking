<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Book a 30-minute call with Nils Eckelt</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f9; color: #111; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 540px; margin: 0 auto; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { color: #666; margin-bottom: 2rem; }
  .step { display: none; }
  .step.active { display: block; }
  .date-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 1.5rem; }
  .date-btn { padding: 8px 4px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.8rem; text-align: center; transition: background 0.15s; }
  .date-btn:disabled { color: #bbb; background: #f0f0f0; cursor: default; }
  .date-btn.selected { background: #0070f3; color: #fff; border-color: #0070f3; }
  .date-btn:not(:disabled):hover { border-color: #0070f3; }
  .slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .slot-btn { padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.9rem; transition: background 0.15s; }
  .slot-btn.selected { background: #0070f3; color: #fff; border-color: #0070f3; }
  .slot-btn:hover { border-color: #0070f3; }
  .form-group { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.4rem; }
  input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; font-family: inherit; }
  textarea { min-height: 80px; resize: vertical; }
  .btn { display: inline-block; padding: 12px 24px; background: #0070f3; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 500; cursor: pointer; }
  .btn:disabled { opacity: 0.6; cursor: default; }
  .btn-secondary { background: transparent; color: #0070f3; border: 1px solid #0070f3; margin-right: 8px; }
  .btn-secondary:hover { background: #f0f7ff; }
  .error { color: #d00; margin-bottom: 1rem; font-size: 0.9rem; }
  .loading { color: #666; font-style: italic; }
  .success-box { background: #f0fff4; border: 1px solid #68d391; border-radius: 8px; padding: 1.5rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Book a 30-minute call</h1>
  <p class="subtitle">with Nils Eckelt</p>

  <div id="step-date" class="step active">
    <p style="margin-bottom:1rem;color:#444">Select a date:</p>
    <div class="date-grid" id="date-grid"></div>
    <div id="date-error" class="error"></div>
  </div>

  <div id="step-slot" class="step">
    <p id="slot-heading" style="margin-bottom:1rem;color:#444"></p>
    <div id="slots-loading" class="loading">Loading&hellip;</div>
    <div class="slots" id="slots-grid"></div>
    <div id="slot-error" class="error"></div>
    <button class="btn btn-secondary" onclick="goBack('step-date', 'step-slot')">← Back</button>
  </div>

  <div id="step-form" class="step">
    <p id="booking-summary" style="margin-bottom:1.5rem"></p>
    <div class="form-group">
      <label for="name">Your name</label>
      <input id="name" type="text" placeholder="Jane Smith" maxlength="100">
    </div>
    <div class="form-group">
      <label for="email">Your email</label>
      <input id="email" type="email" placeholder="jane@example.com">
    </div>
    <div class="form-group">
      <label for="notes">Notes (optional)</label>
      <textarea id="notes" placeholder="What would you like to discuss?" maxlength="1000"></textarea>
    </div>
    <div id="form-error" class="error"></div>
    <button class="btn btn-secondary" onclick="goBack('step-slot', 'step-form')">← Back</button>
    <button class="btn" id="confirm-btn" onclick="submitBooking()">Confirm booking</button>
  </div>

  <div id="step-success" class="step">
    <div class="success-box">
      <h2 style="margin-bottom:1rem">Booking confirmed!</h2>
      <p id="success-details" style="margin-bottom:1rem"></p>
      <p style="margin-bottom:1rem">You'll receive a confirmation email with a calendar invite.</p>
      <p><a id="jitsi-link" href="#" target="_blank" style="color:#0070f3">Join video call</a></p>
    </div>
  </div>
</div>

<script>
const API = "https://book.ecke.lt/api";
const DURATION = 30;
let selectedDate = null;
let selectedSlot = null;
let cachedSlots = null;

function showStep(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goBack(show, hide) {
  showStep(show);
}

// ── Date grid ────────────────────────────────────────────────────────────────
const DAYS = ["Su","Mo","Tu","We","Th","Fr","Sa"];
const WORKING = [1,2,4]; // Mon, Tue, Thu (full day) + Wed, Fri handled in slot filter
const ALL_WORKING = [1,2,3,4,5];

function buildDateGrid() {
  const grid = document.getElementById("date-grid");
  const today = new Date();
  today.setHours(0,0,0,0);
  const max = new Date(today);
  max.setDate(max.getDate() + 14);

  for (let d = new Date(today); d <= max; d.setDate(d.getDate() + 1)) {
    const dow = d.getDay();
    const btn = document.createElement("button");
    btn.className = "date-btn";
    btn.innerHTML = `<div>${DAYS[dow]}</div><div style="font-weight:600">${d.getDate()}</div>`;
    if (!ALL_WORKING.includes(dow)) {
      btn.disabled = true;
    } else {
      const copy = new Date(d);
      btn.onclick = () => selectDate(copy, btn);
    }
    grid.appendChild(btn);
  }
}

function selectDate(date, btn) {
  document.querySelectorAll(".date-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedDate = date;
  loadSlots(date);
  showStep("step-slot");
}

// ── Slot grid ─────────────────────────────────────────────────────────────────
function formatDate(iso) {
  return new Date(iso).toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long", timeZone:"Europe/Berlin" });
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString("de-DE", { hour:"2-digit", minute:"2-digit", timeZone:"Europe/Berlin" });
}

async function loadSlots(date) {
  const loading = document.getElementById("slots-loading");
  const grid = document.getElementById("slots-grid");
  const err = document.getElementById("slot-error");
  loading.style.display = "block";
  grid.innerHTML = "";
  err.textContent = "";

  const from = new Date(date);
  from.setHours(0,0,0,0);
  const to = new Date(date);
  to.setHours(23,59,59,999);

  try {
    const res = await fetch(`${API}/slots?duration=${DURATION}&from=${from.toISOString()}&to=${to.toISOString()}`);
    const data = await res.json();
    loading.style.display = "none";
    if (!res.ok || !data.slots) { err.textContent = data.error || "Failed to load slots."; return; }
    cachedSlots = data.slots;
    if (data.slots.length === 0) { err.textContent = "No available slots on this day."; return; }
    document.getElementById("slot-heading").textContent = `Available times on ${formatDate(data.slots[0].start)}:`;
    data.slots.forEach(slot => {
      const btn = document.createElement("button");
      btn.className = "slot-btn";
      btn.textContent = `${formatTime(slot.start)} – ${formatTime(slot.end)}`;
      btn.onclick = () => selectSlot(slot, btn);
      grid.appendChild(btn);
    });
  } catch {
    loading.style.display = "none";
    err.textContent = "Network error. Please try again.";
  }
}

function selectSlot(slot, btn) {
  document.querySelectorAll(".slot-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedSlot = slot;
  document.getElementById("booking-summary").innerHTML =
    `Booking <strong>${formatDate(slot.start)} at ${formatTime(slot.start)} &ndash; ${formatTime(slot.end)}</strong>`;
  showStep("step-form");
}

// ── Form submit ───────────────────────────────────────────────────────────────
async function submitBooking() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const notes = document.getElementById("notes").value.trim();
  const err = document.getElementById("form-error");
  err.textContent = "";

  if (!name) { err.textContent = "Please enter your name."; return; }
  if (!email || !email.includes("@")) { err.textContent = "Please enter a valid email."; return; }

  const btn = document.getElementById("confirm-btn");
  btn.disabled = true;
  btn.textContent = "Confirming…";

  try {
    const res = await fetch(`${API}/book`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ duration: DURATION, start: selectedSlot.start, name, email, notes }),
    });
    const data = await res.json();

    if (res.status === 409) {
      err.textContent = "This slot was just taken. Please go back and choose another time.";
      btn.disabled = false;
      btn.textContent = "Confirm booking";
      return;
    }
    if (!res.ok) {
      err.textContent = (data.error || "Something went wrong.") + (data.detail ? " — " + data.detail : "");
      btn.disabled = false;
      btn.textContent = "Confirm booking";
      return;
    }

    document.getElementById("success-details").textContent =
      `${formatDate(selectedSlot.start)} at ${formatTime(selectedSlot.start)} – ${formatTime(selectedSlot.end)}`;
    document.getElementById("jitsi-link").href = data.jitsiUrl;
    showStep("step-success");
  } catch {
    err.textContent = "Network error. Please try again.";
    btn.disabled = false;
    btn.textContent = "Confirm booking";
  }
}

buildDateGrid();
</script>
</body>
</html>
