<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <link rel="icon" href="/ne.svg" type="image/svg+xml" />
        <title>Book a call</title>
        <meta name="description" content="Schedule a 30-minute call with Nils Eckelt." />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://book.ecke.lt/30min/" />
        <meta property="og:title" content="Book a 30-minute call with Nils Eckelt" />
        <meta property="og:description" content="Pick a date and time for a 30-minute call." />
        <meta property="og:image" content="https://book.ecke.lt/apple-touch-icon.png" />
        <meta name="twitter:card" content="summary" />
        <style>
            :root {
                --bg: #fafaf9;
                --surface: #fff;
                --text: #2c292d;
                --muted: #736e73;
                --border: #e5e5e5;
                --primary: #006e8a;
                --primary-hover: #005570;
                --on-primary: #fff;
                --danger: #b01040;
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #19181a;
                    --surface: #2d2a2e;
                    --text: #fcfcfa;
                    --muted: #848085;
                    --border: #403e41;
                    --primary: #78dce8;
                    --primary-hover: #60cfe2;
                    --on-primary: #19181a;
                    --danger: #ff6188;
                }
            }
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
            }
            header {
                position: sticky;
                top: 0;
                z-index: 100;
                padding: 1.25rem 1.5rem;
                border-bottom: 1px solid var(--border);
                background: color-mix(in srgb, var(--bg) 88%, transparent);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                display: flex;
                align-items: center;
                gap: 1rem;
            }
            header a {
                color: var(--primary);
                text-decoration: none;
                font-size: 0.875rem;
            }
            header a:hover {
                text-decoration: underline;
            }
            header h1 {
                font-size: 1.1rem;
                font-weight: 600;
                flex: 1;
                min-width: 0;
            }
            .skip-link {
                position: absolute;
                left: 0.5rem;
                top: -3rem;
                z-index: 300;
                background: var(--primary);
                color: var(--on-primary);
                padding: 0.5rem 1rem;
                border-radius: 0.4rem;
                text-decoration: none;
                font-size: 0.85rem;
                transition: top 0.15s;
            }
            .skip-link:focus {
                top: 0.5rem;
            }
            .lang-switch {
                display: inline-flex;
                flex-shrink: 0;
                border: 1px solid var(--border);
                border-radius: 999px;
                overflow: hidden;
                background: var(--bg);
            }
            .lang-btn {
                background: none;
                border: none;
                color: var(--muted);
                cursor: pointer;
                padding: 0.28rem 0.6rem;
                font-family: inherit;
                font-size: 0.7rem;
                font-weight: 500;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                line-height: 1;
                transition: background 0.15s, color 0.15s;
            }
            .lang-btn + .lang-btn {
                border-left: 1px solid var(--border);
            }
            .lang-btn.active {
                background: var(--primary);
                color: var(--on-primary);
            }
            .lang-btn:not(.active):hover {
                color: var(--primary);
            }
            .layout {
                display: grid;
                grid-template-columns: 320px 1fr;
                max-width: 900px;
                margin: 2rem auto;
                padding: 0 1rem;
                align-items: start;
            }
            @media (max-width: 639px) {
                .layout {
                    grid-template-columns: 1fr;
                    margin: 1rem auto;
                }
            }
            .panel {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 1rem;
            }
            .calendar-panel {
                padding: 1.25rem;
            }
            .slots-panel {
                padding: 1.25rem;
                margin-left: 1rem;
            }
            @media (max-width: 639px) {
                .slots-panel {
                    margin-left: 0;
                    margin-top: 1rem;
                }
            }
            .cal-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 1rem;
            }
            .cal-title {
                font-weight: 600;
                font-size: 1rem;
            }
            .cal-nav {
                background: none;
                border: 1px solid var(--border);
                border-radius: 0.4rem;
                color: var(--text);
                cursor: pointer;
                padding: 0.25rem 0.6rem;
                font-size: 1rem;
                line-height: 1;
                transition: background 0.1s;
            }
            .cal-nav:hover {
                background: var(--bg);
            }
            .cal-grid {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 2px;
                width: 100%;
            }
            .cal-slide-viewport {
                overflow: hidden;
                width: 100%;
            }
            .cal-slide-track {
                position: relative;
                will-change: transform;
            }
            .cal-slide-track.is-animating {
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #calGridPrev {
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
            }
            #calGridNext {
                position: absolute;
                top: 0;
                left: 100%;
                width: 100%;
            }
            .cal-day-label {
                text-align: center;
                font-size: 0.75rem;
                color: var(--muted);
                padding: 0.25rem 0;
                font-weight: 600;
            }
            .cal-cell {
                aspect-ratio: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 0.4rem;
                font-size: 0.875rem;
                cursor: default;
                color: var(--muted);
                transition:
                    background 0.1s,
                    color 0.1s;
                user-select: none;
            }
            .cal-cell.empty {
                background: transparent;
            }
            .cal-cell.disabled {
                opacity: 0.35;
            }
            .cal-cell.bookable {
                color: var(--text);
                cursor: pointer;
            }
            .cal-cell.bookable:hover {
                background: color-mix(in srgb, var(--primary) 15%, transparent);
                color: var(--primary);
            }
            .cal-cell.selected {
                background: var(--primary) !important;
                color: var(--on-primary) !important;
                border-radius: 50%;
            }
            .cal-cell.today {
                font-weight: 700;
            }
            .cal-cell.bookable:focus-visible {
                outline: 2px solid var(--primary);
                outline-offset: 1px;
            }
            .slots-nav {
                display: flex;
                align-items: flex-start;
                gap: 0.25rem;
                margin-bottom: 0.75rem;
            }
            .slots-nav-arrow {
                background: none;
                border: 1px solid var(--border);
                border-radius: 0.4rem;
                color: var(--text);
                cursor: pointer;
                font-size: 1.2rem;
                line-height: 1;
                padding: 0.3rem 0.55rem;
                flex-shrink: 0;
                margin-top: 0.1rem;
                overflow: hidden;
                max-width: 4rem;
                transition:
                    background 0.1s,
                    opacity 0.3s ease,
                    max-width 0.3s ease,
                    padding-left 0.3s ease,
                    padding-right 0.3s ease,
                    border-width 0.3s ease;
            }
            .slots-nav-arrow:hover:not(:disabled) {
                background: var(--bg);
            }
            .slots-nav-arrow:disabled {
                opacity: 0.3;
                cursor: not-allowed;
            }
            .slots-day-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
                flex: 1;
                transition: grid-template-columns 0.3s ease;
            }
            .slots-day-col {
                min-width: 0;
                overflow: hidden;
            }
            .slots-day-header {
                text-align: center;
                margin-bottom: 0.5rem;
            }
            .slots-day-weekday {
                font-weight: 600;
                font-size: 0.8rem;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.1em;
            }
            .slots-day-num {
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--text);
                line-height: 1.2;
            }
            .slots-col-list {
                display: flex;
                flex-direction: column;
                gap: 0.35rem;
                transition: gap 0.3s ease;
            }
            .slot-btn {
                background: transparent;
                border: 1.5px solid var(--border);
                border-radius: 999px;
                color: var(--text);
                cursor: pointer;
                font-size: 0.85rem;
                padding: 0.45rem 0.5rem;
                text-align: center;
                width: 100%;
                max-height: 3rem;
                overflow: hidden;
                transition:
                    border-color 0.15s,
                    background 0.15s,
                    color 0.15s,
                    max-height 0.3s ease,
                    opacity 0.3s ease,
                    padding-top 0.3s ease,
                    padding-bottom 0.3s ease;
            }
            @media (max-width: 639px) {
                .slot-btn {
                    font-size: 0.78rem;
                    padding: 0.4rem 0.25rem;
                }
            }
            .slot-btn:hover {
                border-color: var(--primary);
                background: color-mix(in srgb, var(--primary) 12%, transparent);
                color: var(--primary);
            }
            .slot-btn.selected {
                border-color: var(--primary);
                background: var(--primary);
                color: var(--on-primary);
                font-weight: 600;
            }
            .slots-loading,
            .slots-empty {
                color: var(--muted);
                font-size: 0.85rem;
                text-align: center;
                padding: 0.75rem 0;
            }
            .booking-form {
                margin-top: 1.5rem;
                padding-top: 1.25rem;
                border-top: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                gap: 0.85rem;
                animation: fadeIn 0.2s ease;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(6px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .form-group {
                display: flex;
                flex-direction: column;
                gap: 0.3rem;
            }
            label {
                font-size: 0.85rem;
                font-weight: 500;
                color: var(--muted);
            }
            input,
            textarea {
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 0.5rem;
                color: var(--text);
                font-family: inherit;
                font-size: 0.95rem;
                padding: 0.55rem 0.75rem;
                transition:
                    border-color 0.15s,
                    box-shadow 0.15s;
                width: 100%;
            }
            input:focus,
            textarea:focus {
                border-color: var(--primary);
                box-shadow: 0 0 0 3px
                    color-mix(in srgb, var(--primary) 20%, transparent);
                outline: none;
            }
            textarea {
                resize: vertical;
                min-height: 80px;
            }
            .btn-confirm {
                background: var(--primary);
                border: none;
                border-radius: 0.3rem;
                color: var(--on-primary);
                cursor: pointer;
                font-size: 0.95rem;
                font-weight: 600;
                padding: 0.7rem 1.25rem;
                transition:
                    background 0.15s,
                    opacity 0.15s;
            }
            .btn-confirm:hover {
                background: var(--primary-hover);
            }
            .btn-confirm:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }
            .form-error {
                color: var(--danger);
                font-size: 0.875rem;
            }
            .success-box {
                text-align: center;
                padding: 2rem;
                animation: fadeIn 0.3s ease;
            }
            .success-icon {
                font-size: 3rem;
                margin-bottom: 0.75rem;
            }
            .success-box h2 {
                font-size: 1.3rem;
                margin-bottom: 0.5rem;
            }
            .success-box p {
                color: var(--muted);
                font-size: 0.95rem;
                margin-bottom: 0.5rem;
            }
            .jitsi-link {
                display: inline-block;
                margin-top: 0.75rem;
                color: var(--primary);
                font-weight: 600;
                word-break: break-all;
            }
            .placeholder-text {
                color: var(--muted);
                font-size: 0.95rem;
                padding: 1rem 0;
            }
            .slot-change-link {
                display: none;
                text-align: center;
                padding: 0.15rem 0 0.1rem;
            }
            .slot-change-link button {
                background: none;
                border: none;
                color: var(--muted);
                cursor: pointer;
                font-size: 0.78rem;
                font-family: inherit;
                text-decoration: underline;
                text-underline-offset: 2px;
                padding: 0;
            }
            .slot-change-link button:hover {
                color: var(--primary);
            }
            .slot-collapsed .slots-nav-arrow {
                opacity: 0;
                max-width: 0;
                padding-left: 0;
                padding-right: 0;
                border-width: 0;
            }
            .slot-collapsed
                .slots-day-grid:has(
                    .slots-day-col:first-child .slot-btn.selected
                ) {
                grid-template-columns: 1fr 0fr;
            }
            .slot-collapsed
                .slots-day-grid:has(
                    .slots-day-col:last-child .slot-btn.selected
                ) {
                grid-template-columns: 0fr 1fr;
            }
            .slot-collapsed .slot-btn:not(.selected) {
                max-height: 0;
                opacity: 0;
                padding-top: 0;
                padding-bottom: 0;
            }
            .slot-collapsed .slots-col-list {
                gap: 0;
            }
            .slot-collapsed .slot-change-link {
                display: block;
            }
            .privacy-note {
                font-size: 0.75rem;
                color: var(--muted);
                text-align: center;
                margin-top: 0.5rem;
            }
            .privacy-note a {
                color: var(--muted);
            }
        </style>
    </head>
    <body>
        <a class="skip-link" href="#mainContent" id="skipLink">Skip to content</a>
        <header>
            <a href="https://nils.ecke.lt/" id="backLink">&larr; Back</a>
            <h1 id="pageTitle">Book a call</h1>
            <div class="lang-switch" role="group" aria-label="Language">
                <button class="lang-btn" id="btnDE" lang="de" aria-pressed="false" aria-label="Deutsch" onclick="setLang('de')">DE</button>
                <button class="lang-btn" id="btnEN" lang="en" aria-pressed="false" aria-label="English" onclick="setLang('en')">EN</button>
            </div>
        </header>
        <div class="layout" id="mainContent">
            <div class="panel calendar-panel">
                <div class="cal-header">
                    <button class="cal-nav" id="prevMonth" aria-label="Previous month">&#8249;</button>
                    <span class="cal-title" id="calTitle"></span>
                    <button class="cal-nav" id="nextMonth" aria-label="Next month">&#8250;</button>
                </div>
                <div class="cal-slide-viewport" id="calViewport">
                    <div class="cal-slide-track" id="calTrack">
                        <div class="cal-grid" id="calGridPrev"></div>
                        <div class="cal-grid" id="calGrid"></div>
                        <div class="cal-grid" id="calGridNext"></div>
                    </div>
                </div>
            </div>
            <div class="panel slots-panel" id="slotsPanel" aria-live="polite" aria-atomic="false">
                <p class="placeholder-text" id="placeholderText">
                    Select a day to see available slots.
                </p>
            </div>
        </div>
        <script>
            const DURATION = /60/.test(location.pathname) ? 60 : 30;
            const API = "https://book.ecke.lt/api";
            const TZ = "Europe/Berlin";

            const LANGS = {
                en: {
                    title: `Book a ${DURATION}-minute call`,
                    back: "← Back",
                    skip: "Skip to content",
                    placeholder: "Select a day to see available slots.",
                    loading: "Loading…",
                    error: "Error",
                    none: "None",
                    labelName: "Your name",
                    phName: "Jane Smith",
                    labelEmail: "Your email",
                    phEmail: "jane@example.com",
                    labelNotes: "Notes",
                    optional: "(optional)",
                    phNotes: "What would you like to discuss?",
                    confirm: "Confirm booking",
                    confirming: "Booking…",
                    errName: "Please enter your name.",
                    errEmail: "Please enter a valid email.",
                    errGeneric: "Something went wrong.",
                    change: "Change time",
                    privacyNote:
                        'Information on how your data is processed is in our <a href="https://nils.ecke.lt/datenschutz/" target="_blank" rel="noopener">privacy policy</a>.',
                    successTitle: "You're booked!",
                    successEmail: "A confirmation will be sent to your email.",
                    days: ["Mo", "Tu", "We", "Th", "Fr", "Sa", "Su"],
                    wday: ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"],
                    locale: "en-GB",
                    impressum: "Legal Notice",
                    datenschutz: "Privacy Policy",
                    prevMonth: "Previous month",
                    nextMonth: "Next month",
                    prevDays: "Earlier",
                    nextDays: "Later",
                },
                de: {
                    title: `${DURATION}-Minuten-Gespräch buchen`,
                    back: "← Zurück",
                    skip: "Zum Inhalt springen",
                    placeholder:
                        "Wähle einen Tag, um verfügbare Zeiten zu sehen.",
                    loading: "Lädt…",
                    error: "Fehler",
                    none: "Keine",
                    labelName: "Dein Name",
                    phName: "Max Mustermann",
                    labelEmail: "Deine E-Mail",
                    phEmail: "max@beispiel.de",
                    labelNotes: "Notizen",
                    optional: "(optional)",
                    phNotes: "Worüber möchtest du sprechen?",
                    confirm: "Buchung bestätigen",
                    confirming: "Wird gebucht…",
                    errName: "Bitte gib deinen Namen ein.",
                    errEmail: "Bitte gib eine gültige E-Mail ein.",
                    errGeneric: "Etwas ist schiefgelaufen.",
                    change: "Zeit ändern",
                    privacyNote:
                        'Hinweise zur Verarbeitung deiner Daten findest du in der <a href="https://nils.ecke.lt/datenschutz/" target="_blank" rel="noopener">Datenschutzerklärung</a>.',
                    successTitle: "Gebucht!",
                    successEmail:
                        "Eine Bestätigung wird an deine E-Mail gesendet.",
                    days: ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"],
                    wday: ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"],
                    locale: "de-DE",
                    impressum: "Impressum",
                    datenschutz: "Datenschutz",
                    prevMonth: "Vorheriger Monat",
                    nextMonth: "Nächster Monat",
                    prevDays: "Früher",
                    nextDays: "Später",
                },
                es: {
                    title: `Reservar llamada de ${DURATION} minutos`,
                    back: "← Volver",
                    skip: "Saltar al contenido",
                    placeholder:
                        "Selecciona un día para ver los horarios disponibles.",
                    loading: "Cargando…",
                    error: "Error",
                    none: "Ninguno",
                    labelName: "Tu nombre",
                    phName: "Juan García",
                    labelEmail: "Tu correo",
                    phEmail: "juan@ejemplo.es",
                    labelNotes: "Notas",
                    optional: "(opcional)",
                    phNotes: "¿De qué te gustaría hablar?",
                    confirm: "Confirmar reserva",
                    confirming: "Reservando…",
                    errName: "Por favor, introduce tu nombre.",
                    errEmail: "Por favor, introduce un correo válido.",
                    errGeneric: "Algo salió mal.",
                    change: "Cambiar hora",
                    privacyNote:
                        'Encontrarás información sobre el tratamiento de tus datos en nuestra <a href="https://nils.ecke.lt/datenschutz/" target="_blank" rel="noopener">política de privacidad</a>.',
                    successTitle: "¡Reservado!",
                    successEmail: "Se enviará una confirmación a tu correo.",
                    days: ["Lu", "Ma", "Mi", "Ju", "Vi", "Sá", "Do"],
                    wday: ["Do", "Lu", "Ma", "Mi", "Ju", "Vi", "Sá"],
                    locale: "es-ES",
                    impressum: "Aviso legal",
                    datenschutz: "Privacidad",
                    prevMonth: "Mes anterior",
                    nextMonth: "Mes siguiente",
                    prevDays: "Antes",
                    nextDays: "Después",
                },
            };

            let T = LANGS.en;

            const applyLang = (lang) => {
                T = LANGS[lang] || LANGS.en;
                const activeLang = LANGS[lang] ? lang : "en";
                document.documentElement.lang = activeLang;
                document.title = T.title;
                document.getElementById("pageTitle").textContent = T.title;
                document.getElementById("backLink").textContent = T.back;
                const sk = document.getElementById("skipLink");
                if (sk) sk.textContent = T.skip;
                const ph = document.getElementById("placeholderText");
                if (ph) ph.textContent = T.placeholder;
                document.getElementById("btnDE").classList.toggle("active", activeLang === "de");
                document.getElementById("btnEN").classList.toggle("active", activeLang !== "de");
                document.getElementById("btnDE").setAttribute("aria-pressed", String(activeLang === "de"));
                document.getElementById("btnEN").setAttribute("aria-pressed", String(activeLang !== "de"));
                document.getElementById("prevMonth").setAttribute("aria-label", T.prevMonth);
                document.getElementById("nextMonth").setAttribute("aria-label", T.nextMonth);
                const imp = document.getElementById("footerImpressum");
                if (imp) imp.textContent = T.impressum;
                const ds = document.getElementById("footerDatenschutz");
                if (ds) ds.textContent = T.datenschutz;
                renderCalendar();
                if (pairLeft) renderSlotsPanel();
            };

            const setLang = (lang) => {
                localStorage.setItem("booking-lang", lang);
                applyLang(lang);
            };

            function toMondayIndex(jsDay) {
                return (jsDay + 6) % 7;
            }
            function startOfDay(d) {
                const r = new Date(d);
                r.setHours(0, 0, 0, 0);
                return r;
            }
            function formatDateISO(d) {
                return d.toLocaleDateString("sv-SE");
            }
            function formatSlotTime(iso) {
                return new Date(iso).toLocaleTimeString(T.locale, {
                    hour: "2-digit",
                    minute: "2-digit",
                    timeZone: TZ,
                });
            }
            function isSameDay(a, b) {
                return (
                    a.getFullYear() === b.getFullYear() &&
                    a.getMonth() === b.getMonth() &&
                    a.getDate() === b.getDate()
                );
            }
            function isWorkday(d) {
                const w = d.getDay();
                return w >= 1 && w <= 5;
            }
            function stepWorkday(date, fwd) {
                const d = new Date(date);
                do {
                    d.setDate(d.getDate() + (fwd ? 1 : -1));
                } while (!isWorkday(d));
                return d;
            }

            const today = startOfDay(new Date());
            let viewYear = today.getFullYear(),
                viewMonth = today.getMonth();
            // Jump to the month that contains the first bookable day
            (function () {
                const fb = firstBookable();
                if (fb.getFullYear() > viewYear || fb.getMonth() > viewMonth) {
                    viewYear = fb.getFullYear();
                    viewMonth = fb.getMonth();
                }
            })();
            let pairLeft = null,
                pairRight = null,
                selectedSlot = null;
            const slotCache = {};

            function firstBookable() {
                const d = new Date(today);
                d.setDate(d.getDate() + 1);
                return isWorkday(d) ? d : stepWorkday(d, true);
            }
            function lastBookable() {
                const d = new Date(today);
                d.setDate(d.getDate() + 14);
                return d;
            }
            function isBookable(date) {
                const d = startOfDay(date);
                const diff = Math.round((d - today) / 86400000);
                return diff >= 1 && diff <= 14 && isWorkday(d);
            }

            function renderMonthInto(grid, year, month) {
                grid.innerHTML = "";
                T.days.forEach((l) => {
                    const e = document.createElement("div");
                    e.className = "cal-day-label";
                    e.textContent = l;
                    e.setAttribute("aria-hidden", "true");
                    grid.appendChild(e);
                });
                const firstDay = new Date(year, month, 1);
                const offset = toMondayIndex(firstDay.getDay());
                const days = new Date(year, month + 1, 0).getDate();
                for (let i = 0; i < offset; i++) {
                    const e = document.createElement("div");
                    e.className = "cal-cell empty";
                    e.setAttribute("aria-hidden", "true");
                    grid.appendChild(e);
                }
                for (let d = 1; d <= days; d++) {
                    const date = new Date(year, month, d);
                    const el = document.createElement("div");
                    el.className = "cal-cell";
                    el.textContent = d;
                    if (isSameDay(date, today)) el.classList.add("today");
                    if (pairLeft && isSameDay(date, pairLeft)) {
                        el.classList.add("selected");
                        el.setAttribute("role", "button");
                        el.setAttribute("tabindex", "0");
                        el.setAttribute("aria-pressed", "true");
                        el.setAttribute("aria-label", date.toLocaleDateString(T.locale, { weekday: "long", day: "numeric", month: "long" }));
                    } else if (isBookable(date)) {
                        el.classList.add("bookable");
                        el.setAttribute("role", "button");
                        el.setAttribute("tabindex", "0");
                        el.setAttribute("aria-pressed", "false");
                        el.setAttribute("aria-label", date.toLocaleDateString(T.locale, { weekday: "long", day: "numeric", month: "long" }));
                        el.addEventListener("click", () => selectDay(date));
                        el.addEventListener("keydown", (ev) => {
                            if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); selectDay(date); }
                        });
                    } else {
                        el.classList.add("disabled");
                        el.setAttribute("aria-hidden", "true");
                    }
                    grid.appendChild(el);
                }
            }

            function renderCalendar() {
                document.getElementById("calTitle").textContent = new Date(
                    viewYear, viewMonth, 1,
                ).toLocaleDateString(T.locale, { month: "long", year: "numeric" });
                renderMonthInto(document.getElementById("calGrid"), viewYear, viewMonth);
                const pm = viewMonth === 0 ? 11 : viewMonth - 1;
                const py = viewMonth === 0 ? viewYear - 1 : viewYear;
                renderMonthInto(document.getElementById("calGridPrev"), py, pm);
                const nm = viewMonth === 11 ? 0 : viewMonth + 1;
                const ny = viewMonth === 11 ? viewYear + 1 : viewYear;
                renderMonthInto(document.getElementById("calGridNext"), ny, nm);
            }

            function selectDay(date) {
                selectedSlot = null;
                pairLeft = startOfDay(date);
                const last = lastBookable();
                if (isSameDay(pairLeft, last)) {
                    pairRight = null;
                } else {
                    const next = stepWorkday(pairLeft, true);
                    pairRight =
                        Math.round((next - today) / 86400000) <= 14
                            ? next
                            : null;
                }
                renderCalendar();
                renderSlotsPanel();
                if (window.innerWidth < 640)
                    document
                        .getElementById("slotsPanel")
                        .scrollIntoView({ behavior: "smooth", block: "start" });
            }

            async function fetchSlots(date) {
                const iso = formatDateISO(date);
                if (slotCache[iso] !== undefined) return slotCache[iso];
                try {
                    const res = await fetch(
                        `${API}/slots?duration=${DURATION}&from=${encodeURIComponent(iso)}&to=${encodeURIComponent(iso)}`,
                    );
                    if (!res.ok) throw new Error();
                    slotCache[iso] = (await res.json()).slots || [];
                } catch {
                    slotCache[iso] = null;
                }
                return slotCache[iso];
            }

            function prefetchInitialSlots() {
                const d = new Date(today);
                let count = 0;
                while (count < 4) {
                    d.setDate(d.getDate() + 1);
                    if (isBookable(d)) {
                        fetchSlots(new Date(d));
                        count++;
                    }
                }
            }

            function dayColHeader(date) {
                return `<div class="slots-day-header"><div class="slots-day-weekday">${T.wday[date.getDay()]}</div><div class="slots-day-num">${date.getDate()}</div></div>`;
            }

            function renderSlotsPanel() {
                const panel = document.getElementById("slotsPanel");
                panel.classList.remove("slot-collapsed");
                if (!pairLeft) {
                    panel.innerHTML = `<p class="placeholder-text">${T.placeholder}</p>`;
                    return;
                }
                const first = firstBookable(),
                    last = lastBookable();
                const prevDis = isSameDay(pairLeft, first);
                const nextDis = pairRight
                    ? isSameDay(pairRight, last)
                    : isSameDay(pairLeft, last);
                panel.innerHTML = `
        <div class="slots-nav">
          <button class="slots-nav-arrow" id="slotPrev" ${prevDis ? "disabled" : ""} aria-label="${T.prevDays}">&#8249;</button>
          <div class="slots-day-grid">
            <div class="slots-day-col">${dayColHeader(pairLeft)}<div class="slots-col-list" id="slotListL"><div class="slots-loading">${T.loading}</div></div></div>
            <div class="slots-day-col">${pairRight ? dayColHeader(pairRight) : ""}<div class="slots-col-list" id="slotListR">${pairRight ? `<div class="slots-loading">${T.loading}</div>` : ""}</div></div>
          </div>
          <button class="slots-nav-arrow" id="slotNext" ${nextDis ? "disabled" : ""} aria-label="${T.nextDays}">&#8250;</button>
        </div>
        <div id="formContainer"></div>`;
                document
                    .getElementById("slotPrev")
                    .addEventListener("click", () => shiftPair(-1));
                document
                    .getElementById("slotNext")
                    .addEventListener("click", () => shiftPair(1));
                const fetches = [fetchSlots(pairLeft)];
                if (pairRight) fetches.push(fetchSlots(pairRight));
                Promise.all(fetches).then(([l, r]) => {
                    renderCol("slotListL", l);
                    if (pairRight) renderCol("slotListR", r);
                });
            }

            function renderCol(id, slots) {
                const el = document.getElementById(id);
                if (!el) return;
                if (!slots) {
                    el.innerHTML = `<div class="slots-empty">${T.error}</div>`;
                    return;
                }
                if (!slots.length) {
                    el.innerHTML = `<div class="slots-empty">${T.none}</div>`;
                    return;
                }
                el.innerHTML = slots
                    .map(
                        (s) =>
                            `<button class="slot-btn" data-start="${s.start}" data-end="${s.end}" aria-pressed="false">${formatSlotTime(s.start)}</button>`,
                    )
                    .join("");
                el.querySelectorAll(".slot-btn").forEach((btn) =>
                    btn.addEventListener("click", () => {
                        document
                            .querySelectorAll(".slot-btn")
                            .forEach((b) => { b.classList.remove("selected"); b.setAttribute("aria-pressed", "false"); });
                        btn.classList.add("selected");
                        btn.setAttribute("aria-pressed", "true");
                        selectedSlot = {
                            start: btn.dataset.start,
                            end: btn.dataset.end,
                        };
                        showForm(
                            document.getElementById("formContainer"),
                            selectedSlot,
                        );
                    }),
                );
            }

            function shiftPair(dir) {
                selectedSlot = null;
                if (dir === 1) {
                    pairLeft = pairRight || stepWorkday(pairLeft, true);
                    const next = stepWorkday(pairLeft, true);
                    pairRight =
                        Math.round((next - today) / 86400000) <= 14
                            ? next
                            : null;
                } else {
                    pairRight = pairLeft;
                    pairLeft = stepWorkday(pairLeft, false);
                    if (Math.round((pairLeft - today) / 86400000) < 1)
                        pairLeft = firstBookable();
                }
                renderCalendar();
                renderSlotsPanel();
            }

            function collapseSlots(slot) {
                const panel = document.getElementById("slotsPanel");
                panel.classList.add("slot-collapsed");
                const existing = document.getElementById("slotChangeLink");
                if (existing) existing.remove();
                const fc = document.getElementById("formContainer");
                const link = document.createElement("div");
                link.id = "slotChangeLink";
                link.className = "slot-change-link";
                link.innerHTML = `<button>${T.change}</button>`;
                panel.insertBefore(link, fc);
                link.querySelector("button").addEventListener("click", () => {
                    panel.classList.remove("slot-collapsed");
                    link.remove();
                    selectedSlot = null;
                    document
                        .querySelectorAll(".slot-btn")
                        .forEach((b) => b.classList.remove("selected"));
                    fc.innerHTML = "";
                });
            }

            function showForm(container, slot) {
                const params = new URLSearchParams(location.search);
                const preName = params.get("name") || "",
                    preEmail = params.get("email") || "";
                const isReschedule = !!params.get("reschedule");
                container.innerHTML = `
        <form class="booking-form" id="bForm" novalidate>
          <div class="form-group"><label for="fName">${T.labelName}</label><input type="text" id="fName" placeholder="${T.phName}" value="${preName.replace(/"/g, "&quot;")}" required /></div>
          <div class="form-group"><label for="fEmail">${T.labelEmail}</label><input type="email" id="fEmail" placeholder="${T.phEmail}" value="${preEmail.replace(/"/g, "&quot;")}" required /></div>
          <div class="form-group"><label for="fNotes">${T.labelNotes} <span style="font-weight:400">${T.optional}</span></label><textarea id="fNotes" placeholder="${T.phNotes}"></textarea></div>
          <div id="fErr" class="form-error" role="alert" style="display:none"></div>
          <button type="submit" class="btn-confirm" id="btnOk">${T.confirm}</button>
          <p class="privacy-note">${T.privacyNote}</p>
        </form>`;
                collapseSlots(slot);
                document
                    .getElementById("bForm")
                    .addEventListener("submit", async (e) => {
                        e.preventDefault();
                        const name = document
                            .getElementById("fName")
                            .value.trim();
                        const email = document
                            .getElementById("fEmail")
                            .value.trim();
                        const notes = document
                            .getElementById("fNotes")
                            .value.trim();
                        const err = document.getElementById("fErr"),
                            btn = document.getElementById("btnOk");
                        err.style.display = "none";
                        if (!name) {
                            err.textContent = T.errName;
                            err.style.display = "block";
                            return;
                        }
                        if (!email || !email.includes("@")) {
                            err.textContent = T.errEmail;
                            err.style.display = "block";
                            return;
                        }
                        btn.disabled = true;
                        btn.textContent = T.confirming;
                        try {
                            const rescheduleUid =
                                new URLSearchParams(location.search).get(
                                    "reschedule",
                                ) || undefined;
                            const res = await fetch(`${API}/book`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    duration: DURATION,
                                    start: slot.start,
                                    name,
                                    email,
                                    notes,
                                    ...(rescheduleUid && { rescheduleUid }),
                                }),
                            });
                            const data = await res.json();
                            if (!res.ok)
                                throw new Error(data.error || T.errGeneric);
                            const panel = document.getElementById("slotsPanel");
                            const fmt = (d) =>
                                new Date(d).toLocaleTimeString(T.locale, {
                                    hour: "2-digit",
                                    minute: "2-digit",
                                    timeZone: TZ,
                                });
                            const dayFmt = new Date(slot.start).toLocaleString(
                                T.locale,
                                {
                                    weekday: "long",
                                    day: "numeric",
                                    month: "long",
                                    hour: "2-digit",
                                    minute: "2-digit",
                                    timeZone: TZ,
                                },
                            );
                            panel.innerHTML = `<div class="success-box"><div class="success-icon" aria-hidden="true">&#x2705;</div><h2>${T.successTitle}</h2><p>${dayFmt} &ndash; ${fmt(slot.end)}</p><p>${T.successEmail}</p>${data.jitsiUrl ? `<a class="jitsi-link" href="${data.jitsiUrl}" target="_blank" rel="noopener">${data.jitsiUrl}</a>` : ""}</div>`;
                        } catch (ex) {
                            btn.disabled = false;
                            btn.textContent = T.confirm;
                            err.textContent = ex.message || T.errGeneric;
                            err.style.display = "block";
                        }
                    });
            }

            // === Carousel swipe ===
            const _vp    = document.getElementById("calViewport");
            const _track = document.getElementById("calTrack");

            function _w() { return _vp.clientWidth; }

            function _slideTo(px, animate, then) {
                _track.classList.toggle("is-animating", animate);
                _track.style.transform = px === 0 ? "" : `translateX(${px}px)`;
                if (then) _track.addEventListener("transitionend", then, { once: true });
            }

            function _resetTrack() {
                _track.classList.remove("is-animating");
                _track.style.transform = "";
            }

            function _commitMonth(dir) {
                viewMonth += dir;
                if (viewMonth > 11) { viewMonth = 0; viewYear++; }
                if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
                document.getElementById("calTitle").textContent = new Date(
                    viewYear, viewMonth, 1,
                ).toLocaleDateString(T.locale, { month: "long", year: "numeric" });
                renderCalendar();
                _resetTrack();
            }

            document.getElementById("prevMonth").addEventListener("click", () => {
                _slideTo(_w(), true, () => _commitMonth(-1));
            });
            document.getElementById("nextMonth").addEventListener("click", () => {
                _slideTo(-_w(), true, () => _commitMonth(1));
            });

            // Touch drag
            let _tx = null;
            _vp.addEventListener("touchstart", (e) => {
                _tx = e.changedTouches[0].clientX;
                _track.classList.remove("is-animating");
                _track.style.transform = "";
            }, { passive: true });
            _vp.addEventListener("touchmove", (e) => {
                if (_tx === null) return;
                const dx = e.changedTouches[0].clientX - _tx;
                _track.style.transform = `translateX(${dx}px)`;
            }, { passive: true });
            _vp.addEventListener("touchend", (e) => {
                if (_tx === null) return;
                const dx = e.changedTouches[0].clientX - _tx;
                _tx = null;
                const threshold = _w() * 0.28;
                if (dx < -threshold)     _slideTo(-_w(), true, () => _commitMonth(1));
                else if (dx > threshold) _slideTo(_w(),  true, () => _commitMonth(-1));
                else                     _slideTo(0,     true);
            }, { passive: true });

            window.addEventListener("resize", () => {
                _track.classList.remove("is-animating");
                _track.style.transform = "";
            }, { passive: true });

            const _sl = localStorage.getItem("booking-lang");
            const _al = navigator.language?.slice(0, 2).toLowerCase();
            applyLang(_sl || (LANGS[_al] ? _al : "en"));
            prefetchInitialSlots();
        </script>
