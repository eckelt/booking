<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Book a call with Nils Eckelt</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9f9f9; color: #111; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.15rem; }
  .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }

  /* ── Calendar ── */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .cal-header .month-label { font-weight: 600; font-size: 1rem; }
  .cal-nav { background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 4px 8px; border-radius: 50%; color: #444; line-height: 1; }
  .cal-nav:hover { background: #eee; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 1.75rem; }
  .cal-dow { text-align: center; font-size: 0.72rem; font-weight: 600; color: #888; padding: 4px 0 6px; }
  .cal-day { display: flex; align-items: center; justify-content: center; aspect-ratio: 1; border-radius: 50%; font-size: 0.82rem; cursor: default; color: #bbb; position: relative; }
  .cal-day.other-month { color: #ddd; }
  .cal-day.past { color: #ccc; }
  .cal-day.today { font-weight: 700; color: #111; }
  .cal-day.today::after {
    content: '';
    position: absolute;
    bottom: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #1a73e8;
  }
  .cal-day.available {
    background: #1a73e8;
    color: #fff;
    cursor: pointer;
    font-weight: 500;
  }
  .cal-day.available:hover { background: #1558b0; }
  .cal-day.available.today { background: #1a73e8; color: #fff; }
  .cal-day.available.today::after { background: #fff; }
  .cal-day.selected {
    background: #0d47a1;
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 6px rgba(13,71,161,0.4);
  }

  /* ── Slot columns ── */
  .slots-section { display: none; }
  .slots-section.visible { display: block; }
  .slots-nav { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
  .slots-nav-btn { background: none; border: 1px solid #ddd; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; color: #444; flex-shrink: 0; }
  .slots-nav-btn:hover:not(:disabled) { background: #eee; border-color: #aaa; }
  .slots-nav-btn:disabled { opacity: 0.35; cursor: default; }
  .slots-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .slots-col-header { font-size: 0.78rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.6rem; text-align: center; }
  .slots-col-header.no-slots-header { color: #bbb; }
  .slots-list { display: flex; flex-direction: column; gap: 8px; min-height: 40px; }
  .slot-btn {
    padding: 9px 12px;
    border: 1.5px solid #1a73e8;
    border-radius: 999px;
    background: #fff;
    cursor: pointer;
    font-size: 0.88rem;
    text-align: center;
    color: #1a73e8;
    font-weight: 500;
    transition: background 0.12s, color 0.12s;
  }
  .slot-btn:hover { background: #e8f0fe; }
  .slot-btn.selected { background: #1a73e8; color: #fff; }
  .no-slots-msg { font-size: 0.82rem; color: #aaa; text-align: center; padding: 8px 0; }
  .slots-loading { font-size: 0.85rem; color: #888; font-style: italic; text-align: center; padding: 12px 0; grid-column: 1 / -1; }

  /* ── Form ── */
  .step { display: none; }
  .step.active { display: block; }
  label { display: block; margin-bottom: 0.25rem; font-weight: 500; font-size: 0.9rem; }
  input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; margin-bottom: 1rem; font-family: inherit; }
  input:focus, textarea:focus { outline: none; border-color: #1a73e8; }
  textarea { resize: vertical; min-height: 80px; }
  .btn { display: inline-block; padding: 11px 22px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; }
  .btn:hover { background: #1558b0; }
  .btn-secondary { background: transparent; color: #1a73e8; border: 1.5px solid #1a73e8; margin-right: 8px; }
  .btn-secondary:hover { background: #e8f0fe; }
  .error { color: #c62828; margin-bottom: 1rem; font-size: 0.88rem; }
  .success-box { background: #f0fff4; border: 1px solid #68d391; border-radius: 10px; padding: 1.5rem; }
  .success-box h2 { color: #276749; margin-bottom: 0.5rem; }
  .jitsi-link { display: inline-block; margin-top: 1rem; padding: 10px 20px; background: #1a73e8; color: #fff; border-radius: 8px; text-decoration: none; font-size: 0.95rem; }
  .booking-summary-line { margin-bottom: 1.5rem; color: #444; font-size: 0.95rem; }
  .booking-summary-line strong { color: #111; }

  /* ── Dark theme: Monokai Pro ── */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:            #2D2A2E;
      --surface:       #403E41;
      --text:          #FCFCFA;
      --muted:         #939293;
      --border:        #5B5A5E;
      --primary:       #AB9DF2;
      --primary-hover: #9D8FE0;
      --danger:        #FF6188;
    }

    body {
      background: var(--bg);
      color: var(--text);
    }

    .subtitle { color: var(--muted); }

    /* Calendar nav */
    .cal-nav { color: var(--muted); }
    .cal-nav:hover { background: var(--surface); }

    .cal-dow { color: var(--muted); }

    /* Calendar day states */
    .cal-day { color: var(--border); }
    .cal-day.other-month { color: var(--border); opacity: 0.5; }
    .cal-day.past { color: var(--border); }
    .cal-day.today { color: var(--text); }
    .cal-day.today::after { background: var(--primary); }

    .cal-day.available {
      background: var(--primary);
      color: var(--bg);
    }
    .cal-day.available:hover {
      background: var(--primary-hover);
    }
    .cal-day.available.today { background: var(--primary); color: var(--bg); }
    .cal-day.available.today::after { background: var(--bg); }
    .cal-day.selected {
      background: var(--primary);
      color: var(--bg);
      box-shadow: 0 2px 8px rgba(171, 157, 242, 0.45);
    }

    /* Slot nav buttons */
    .slots-nav-btn {
      border-color: var(--border);
      color: var(--muted);
    }
    .slots-nav-btn:hover:not(:disabled) {
      background: var(--surface);
      border-color: var(--muted);
    }

    .slots-col-header { color: var(--muted); }
    .slots-col-header.no-slots-header { color: var(--border); }

    /* Slot buttons */
    .slot-btn {
      border-color: var(--primary);
      background: transparent;
      color: var(--primary);
    }
    .slot-btn:hover {
      background: color-mix(in srgb, var(--primary) 20%, transparent);
    }
    .slot-btn.selected {
      background: var(--primary);
      color: var(--bg);
    }

    .no-slots-msg { color: var(--border); }
    .slots-loading { color: var(--muted); }

    /* Form */
    label { color: var(--text); }
    input, textarea {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    input:focus, textarea:focus { border-color: var(--primary); }

    .btn {
      background: var(--primary);
      color: var(--bg);
    }
    .btn:hover { background: var(--primary-hover); }

    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border-color: var(--primary);
    }
    .btn-secondary:hover {
      background: color-mix(in srgb, var(--primary) 20%, transparent);
    }

    .error { color: var(--danger); }

    .success-box {
      background: var(--surface);
      border-color: var(--border);
    }
    .success-box h2 { color: var(--primary); }

    .jitsi-link {
      background: var(--primary);
      color: var(--bg);
    }
    .jitsi-link:hover { background: var(--primary-hover); }

    .booking-summary-line { color: var(--muted); }
    .booking-summary-line strong { color: var(--text); }
  }
</style>
</head>
<body>
<div class="container">
  <h1 id="page-title">Book a 30-minute call</h1>
  <p class="subtitle">with Nils Eckelt</p>

  <!-- Step 1+2: calendar + slot picker (shown together) -->
  <div class="step active" id="step-pick">

    <!-- Month calendar -->
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev" onclick="shiftMonth(-1)" title="Previous month">&#8249;</button>
      <span class="cal-label month-label" id="cal-month-label"></span>
      <button class="cal-nav" id="cal-next" onclick="shiftMonth(1)" title="Next month">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>

    <!-- Two-column slot view -->
    <div class="slots-section" id="slots-section">
      <div class="slots-nav">
        <button class="slots-nav-btn" id="slots-prev" onclick="shiftDayPair(-1)" title="Previous days">&#8249;</button>
        <div style="flex:1"></div>
        <button class="slots-nav-btn" id="slots-next" onclick="shiftDayPair(1)" title="Next days">&#8250;</button>
      </div>
      <div class="slots-columns" id="slots-columns">
        <div class="slots-loading" id="slots-loading">Loading available times…</div>
      </div>
    </div>

  </div>

  <!-- Step 3: enter details -->
  <div class="step" id="step-form">
    <p class="booking-summary-line">Booking <strong id="booking-summary"></strong></p>
    <label for="name">Your name</label>
    <input type="text" id="name" placeholder="Jane Doe" maxlength="100">
    <label for="email">Your email</label>
    <input type="email" id="email" placeholder="jane@example.com">
    <label for="notes">Notes (optional)</label>
    <textarea id="notes" placeholder="What would you like to discuss?" maxlength="1000"></textarea>
    <div id="form-error" class="error"></div>
    <button class="btn btn-secondary" onclick="goToStep('step-pick')">&#8592; Back</button>
    <button class="btn" id="confirm-btn" onclick="submitBooking()">Confirm booking</button>
  </div>

  <!-- Step 4: success -->
  <div class="step" id="step-success">
    <div class="success-box">
      <h2>Booking confirmed!</h2>
      <p id="success-details"></p>
      <a class="jitsi-link" id="jitsi-link" href="#" target="_blank" rel="noopener">Join video call</a>
      <p style="margin-top:1rem;color:#555;font-size:0.9rem">Check your email for a calendar invite.</p>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const DURATION = parseInt(params.get("duration") || "30", 10);
const API = "/api";
if (DURATION !== 30) {
  document.getElementById("page-title").textContent = `Book a ${DURATION}-minute call`;
}

// ── State ─────────────────────────────────────────────────────────────────────
const today = new Date();
today.setHours(0, 0, 0, 0);

let calYear  = today.getFullYear();
let calMonth = today.getMonth(); // 0-based

// The "anchor" date for the 2-column slot view (left column = anchorDate)
let anchorDate = null;
// selectedSlot: { start, end }
let selectedSlot = null;
// Cache: isoDate -> slots array (or null while loading)
const slotCache = {};

// ── Helpers ───────────────────────────────────────────────────────────────────
function isoDate(d) {
  // Returns YYYY-MM-DD in local time
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function dateFromIso(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function isWeekend(d) {
  const dow = d.getDay();
  return dow === 0 || dow === 6;
}

function isPast(d) {
  return d < today;
}

function nextWorkday(d) {
  let r = addDays(d, 1);
  while (isWeekend(r)) r = addDays(r, 1);
  return r;
}

function prevWorkday(d) {
  let r = addDays(d, -1);
  while (isWeekend(r) || isPast(r)) r = addDays(r, -1);
  if (r < today) return null;
  return r;
}

function formatTime(iso) {
  return new Date(iso).toLocaleTimeString("de-DE", {
    timeZone: "Europe/Berlin", hour: "2-digit", minute: "2-digit", hour12: false,
  });
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString("en-GB", {
    timeZone: "Europe/Berlin", weekday: "long", day: "numeric", month: "long",
  });
}

function colHeader(d) {
  const dow = d.toLocaleDateString("en-GB", { weekday: "short" }).toUpperCase().slice(0, 2);
  return `${dow} ${d.getDate()}`;
}

// ── Step navigation ───────────────────────────────────────────────────────────
function goToStep(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ── Calendar rendering ────────────────────────────────────────────────────────
function buildCal() {
  const grid = document.getElementById("cal-grid");
  grid.innerHTML = "";

  // Day-of-week headers (Monday first)
  ["Mo","Tu","We","Th","Fr","Sa","Su"].forEach(name => {
    const h = document.createElement("div");
    h.className = "cal-dow";
    h.textContent = name;
    grid.appendChild(h);
  });

  document.getElementById("cal-month-label").textContent =
    new Date(calYear, calMonth, 1).toLocaleDateString("en-GB", { month: "long", year: "numeric" });

  // First day of month, adjusted to Monday-first grid (0=Mon … 6=Sun)
  const firstDay = new Date(calYear, calMonth, 1);
  const rawDow = firstDay.getDay(); // 0=Sun
  const offset = rawDow === 0 ? 6 : rawDow - 1;

  // Days from previous month as fillers
  for (let i = 0; i < offset; i++) {
    const filler = document.createElement("div");
    filler.className = "cal-day other-month";
    const pd = new Date(calYear, calMonth, 1 - (offset - i));
    filler.textContent = pd.getDate();
    grid.appendChild(filler);
  }

  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(calYear, calMonth, day);
    const cell = document.createElement("div");
    cell.className = "cal-day";

    const isToday = d.getTime() === today.getTime();
    const past = isPast(d);
    const weekend = isWeekend(d);

    if (isToday) cell.classList.add("today");
    if (past && !isToday) cell.classList.add("past");

    if (!past && !weekend) {
      cell.classList.add("available");
      // Mark selected
      if (anchorDate && isoDate(d) === isoDate(anchorDate)) {
        cell.classList.add("selected");
      }
      cell.onclick = () => selectCalDay(d);
    }

    cell.textContent = day;
    grid.appendChild(cell);
  }

  // Trailing fillers to complete last row
  const totalCells = offset + daysInMonth;
  const remainder = totalCells % 7;
  if (remainder !== 0) {
    for (let i = 1; i <= 7 - remainder; i++) {
      const filler = document.createElement("div");
      filler.className = "cal-day other-month";
      filler.textContent = i;
      grid.appendChild(filler);
    }
  }

  // Disable prev if we're already in current month
  document.getElementById("cal-prev").disabled =
    calYear === today.getFullYear() && calMonth === today.getMonth();
}

function shiftMonth(delta) {
  calMonth += delta;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  buildCal();
}

// ── Select a calendar day ─────────────────────────────────────────────────────
function selectCalDay(d) {
  anchorDate = d;
  buildCal(); // re-render to show selection ring
  showSlots();
}

// ── Slot column view ──────────────────────────────────────────────────────────
function showSlots() {
  const section = document.getElementById("slots-section");
  section.classList.add("visible");

  // Determine two dates to show
  const d1 = anchorDate;
  const d2 = nextWorkday(d1);

  renderSlotColumns(d1, d2);
  updateSlotNavButtons();
}

function shiftDayPair(delta) {
  if (!anchorDate) return;
  if (delta > 0) {
    anchorDate = nextWorkday(anchorDate);
  } else {
    // Go back one workday
    const prev = prevWorkday(anchorDate);
    if (prev) anchorDate = prev;
  }
  buildCal(); // update selection highlight
  showSlots();
}

function updateSlotNavButtons() {
  const prev = prevWorkday(anchorDate);
  document.getElementById("slots-prev").disabled = !prev;
  // Next is always possible (future workdays exist)
  document.getElementById("slots-next").disabled = false;
}

async function renderSlotColumns(d1, d2) {
  const container = document.getElementById("slots-columns");
  container.innerHTML = `<div class="slots-loading" id="slots-loading">Loading available times…</div>`;

  const iso1 = isoDate(d1);
  const iso2 = isoDate(d2);

  // Fetch both days (possibly from cache)
  await Promise.all([fetchSlots(iso1), fetchSlots(iso2)]);

  container.innerHTML = "";

  [iso1, iso2].forEach(iso => {
    const d = dateFromIso(iso);
    const col = document.createElement("div");

    const header = document.createElement("div");
    const slots = slotCache[iso] || [];
    header.className = "slots-col-header" + (slots.length === 0 ? " no-slots-header" : "");
    header.textContent = colHeader(d);
    col.appendChild(header);

    const list = document.createElement("div");
    list.className = "slots-list";
    if (slots.length === 0) {
      const msg = document.createElement("div");
      msg.className = "no-slots-msg";
      msg.textContent = "No slots";
      list.appendChild(msg);
    } else {
      slots.forEach(slot => {
        const btn = document.createElement("button");
        btn.className = "slot-btn";
        if (selectedSlot && selectedSlot.start === slot.start) btn.classList.add("selected");
        btn.textContent = formatTime(slot.start);
        btn.onclick = () => pickSlot(slot, btn);
        list.appendChild(btn);
      });
    }
    col.appendChild(list);
    container.appendChild(col);
  });
}

async function fetchSlots(iso) {
  if (slotCache[iso] !== undefined) return;
  slotCache[iso] = null; // mark as in-flight
  try {
    const res = await fetch(`${API}/slots?duration=${DURATION}&from=${iso}&to=${iso}`);
    const data = await res.json();
    slotCache[iso] = data.slots || [];
  } catch {
    slotCache[iso] = [];
  }
}

function pickSlot(slot, btn) {
  selectedSlot = slot;
  // Highlight selected
  document.querySelectorAll(".slot-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");

  const label = `${formatDate(slot.start)} at ${formatTime(slot.start)} – ${formatTime(slot.end)}`;
  document.getElementById("booking-summary").textContent = label;
  goToStep("step-form");
}

// ── Booking form ──────────────────────────────────────────────────────────────
async function submitBooking() {
  const name  = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const notes = document.getElementById("notes").value.trim();
  const err   = document.getElementById("form-error");
  err.textContent = "";

  if (!name)  { err.textContent = "Please enter your name."; return; }
  if (!email || !email.includes("@")) { err.textContent = "Please enter a valid email."; return; }

  const btn = document.getElementById("confirm-btn");
  btn.disabled = true;
  btn.textContent = "Confirming…";

  try {
    const res = await fetch(`${API}/book`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ start: selectedSlot.start, duration: DURATION, name, email, notes }),
    });
    const data = await res.json();

    if (res.status === 409) {
      err.textContent = "This slot was just taken. Please go back and choose another time.";
      btn.disabled = false; btn.textContent = "Confirm booking";
      return;
    }
    if (!res.ok) {
      err.textContent = data.error || "Something went wrong. Please try again.";
      btn.disabled = false; btn.textContent = "Confirm booking";
      return;
    }

    document.getElementById("success-details").textContent =
      `${formatDate(selectedSlot.start)} at ${formatTime(selectedSlot.start)} – ${formatTime(selectedSlot.end)}`;
    document.getElementById("jitsi-link").href = data.jitsiUrl;
    goToStep("step-success");
  } catch {
    err.textContent = "Network error. Please try again.";
    btn.disabled = false; btn.textContent = "Confirm booking";
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildCal();
</script>
</body>
</html>
