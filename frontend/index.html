<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Book a call with Nils Eckelt</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #f9f9f9;
    --surface:    #fff;
    --text:       #111;
    --muted:      #666;
    --border:     #ddd;
    --primary:    #c8910a;
    --on-primary: #fff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:         #19181a;
      --surface:    #2D2A2E;
      --text:       #FCFCFA;
      --muted:      #8a8a8a;
      --border:     #5B5A5E;
      --primary:    #FFD866;
      --on-primary: #19181a;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }

  .container { max-width: 480px; width: 100%; text-align: center; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.4rem; }
  .subtitle { color: var(--muted); margin-bottom: 2.5rem; font-size: 1rem; }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .card {
    display: block; text-decoration: none;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 1.5rem 1rem;
    color: var(--text); transition: border-color 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .card:hover {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 20%, transparent);
  }

  .card-duration {
    font-size: 2rem; font-weight: 700; color: var(--primary); display: block; margin-bottom: 0.25rem;
  }
  .card-label { font-size: 0.9rem; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <h1 id="heading"></h1>
  <p class="subtitle" id="subtitle"></p>
  <div class="cards">
    <a class="card" href="/30min/" id="card-30">
      <span class="card-duration">30</span>
      <span class="card-label" id="label-30"></span>
    </a>
    <a class="card" href="/60min/" id="card-60">
      <span class="card-duration">60</span>
      <span class="card-label" id="label-60"></span>
    </a>
  </div>
</div>

<script>
const LANGS = {
  en: { heading: 'Book a call', subtitle: 'with Nils Eckelt', min: 'minutes' },
  de: { heading: 'Gespräch buchen', subtitle: 'mit Nils Eckelt', min: 'Minuten' },
  es: { heading: 'Reservar llamada', subtitle: 'con Nils Eckelt', min: 'minutos' },
};
const T = LANGS[(navigator.language || 'en').slice(0, 2).toLowerCase()] || LANGS.en;
document.getElementById('heading').textContent = T.heading;
document.getElementById('subtitle').textContent = T.subtitle;
document.getElementById('label-30').textContent = `30 ${T.min}`;
document.getElementById('label-60').textContent = `60 ${T.min}`;
document.title = `${T.heading} – Nils Eckelt`;
</script>
</body>
</html>
