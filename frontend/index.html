<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Book time with Nils Eckelt</title>
        <style>
            :root {
                --bg: #fafaf9;
                --surface: #fff;
                --text: #2c292d;
                --muted: #736e73;
                --border: #e5e5e5;
                --primary: #006e8a;
                --primary-hover: #005570;
                --on-primary: #fff;
                --danger: #b01040;
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #19181a;
                    --surface: #2d2a2e;
                    --text: #fcfcfa;
                    --muted: #848085;
                    --border: #403e41;
                    --primary: #78dce8;
                    --primary-hover: #60cfe2;
                    --on-primary: #19181a;
                    --danger: #ff6188;
                }
            }
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem 1rem;
            }
            .container {
                max-width: 480px;
                width: 100%;
                text-align: center;
            }
            h1 {
                font-size: 1.5rem;
                font-weight: 700;
                margin-bottom: 0.4rem;
            }
            .sub {
                color: var(--muted);
                margin-bottom: 2.5rem;
                font-size: 0.95rem;
            }
            .cards {
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }
            .card {
                display: block;
                text-decoration: none;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 1rem;
                padding: 1.5rem;
                text-align: left;
                transition:
                    border-color 0.15s,
                    box-shadow 0.15s;
            }
            .card:hover {
                border-color: var(--primary);
                box-shadow: 0 0 0 3px
                    color-mix(in srgb, var(--primary) 20%, transparent);
            }
            .card-title {
                font-size: 1.05rem;
                font-weight: 600;
                margin-bottom: 0.25rem;
                color: var(--text);
            }
            .card-desc {
                font-size: 0.875rem;
                color: var(--muted);
            }
            .card-arrow {
                float: right;
                color: var(--primary);
                font-size: 1.2rem;
            }
            .lang-switch {
                display: flex;
                justify-content: center;
                margin-top: 2.5rem;
            }
            .lang-pill {
                display: inline-flex;
                border: 1px solid var(--border);
                border-radius: 999px;
                overflow: hidden;
            }
            .lang-btn {
                background: none;
                border: none;
                color: var(--muted);
                cursor: pointer;
                padding: 0.3rem 0.7rem;
                font-family: inherit;
                font-size: 0.7rem;
                font-weight: 500;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                line-height: 1;
                transition: background 0.15s, color 0.15s;
            }
            .lang-btn + .lang-btn {
                border-left: 1px solid var(--border);
            }
            .lang-btn.active {
                background: var(--primary);
                color: var(--on-primary);
            }
            .lang-btn:not(.active):hover {
                color: var(--primary);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 id="pageTitle">Book time with Nils Eckelt</h1>
            <p class="sub" id="pageSub">Choose a duration</p>
            <div class="cards">
                <a class="card" href="/30min/">
                    <span class="card-arrow">&#8250;</span>
                    <div class="card-title" id="card30title">
                        30-minute call
                    </div>
                    <div class="card-desc" id="card30desc">
                        A focused conversation
                    </div>
                </a>
                <a class="card" href="/60min/">
                    <span class="card-arrow">&#8250;</span>
                    <div class="card-title" id="card60title">
                        60-minute call
                    </div>
                    <div class="card-desc" id="card60desc">
                        A deeper discussion
                    </div>
                </a>
            </div>
            <div class="lang-switch">
                <div class="lang-pill">
                    <button class="lang-btn" id="btnDE" onclick="setLang('de')">DE</button>
                    <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
                </div>
            </div>
        </div>
        <script>
            const L = {
                en: {
                    title: "Book time with Nils Eckelt",
                    sub: "Choose a duration",
                    t30: "30-minute call",
                    d30: "A focused conversation",
                    t60: "60-minute call",
                    d60: "A deeper discussion",
                },
                de: {
                    title: "Zeit buchen mit Nils Eckelt",
                    sub: "Dauer wählen",
                    t30: "30-Minuten-Gespräch",
                    d30: "Ein fokussiertes Gespräch",
                    t60: "60-Minuten-Gespräch",
                    d60: "Eine ausführlichere Unterhaltung",
                },
                es: {
                    title: "Reservar tiempo con Nils Eckelt",
                    sub: "Elige la duración",
                    t30: "Llamada de 30 minutos",
                    d30: "Una conversación enfocada",
                    t60: "Llamada de 60 minutos",
                    d60: "Una discusión más profunda",
                },
            };

            function applyLang(lang) {
                const T = L[lang] || L.en;
                const activeLang = L[lang] ? lang : "en";
                document.documentElement.lang = activeLang;
                document.title = T.title;
                document.getElementById("pageTitle").textContent = T.title;
                document.getElementById("pageSub").textContent = T.sub;
                document.getElementById("card30title").textContent = T.t30;
                document.getElementById("card30desc").textContent = T.d30;
                document.getElementById("card60title").textContent = T.t60;
                document.getElementById("card60desc").textContent = T.d60;
                document.getElementById("btnDE").classList.toggle("active", activeLang === "de");
                document.getElementById("btnEN").classList.toggle("active", activeLang !== "de");
            }

            function setLang(lang) {
                localStorage.setItem("booking-lang", lang);
                applyLang(lang);
            }

            const _saved = localStorage.getItem("booking-lang");
            const _auto = navigator.language?.slice(0, 2).toLowerCase();
            applyLang(_saved || (L[_auto] ? _auto : "en"));
        </script>
    </body>
</html>
